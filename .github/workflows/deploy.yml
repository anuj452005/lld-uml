name: Deploy to Azure Container Apps

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build and push all three images to ACR
  # ─────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Java Parser
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/uml-parser:${{ github.sha }} ./services/java-parser
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/uml-parser:${{ github.sha }}

      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/uml-backend:${{ github.sha }} ./backend
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/uml-backend:${{ github.sha }}

      - name: Build and Push Frontend
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.BACKEND_URL }}/api/v1" \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/uml-frontend:${{ github.sha }} \
            -f frontend/Dockerfile .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/uml-frontend:${{ github.sha }}

  # ─────────────────────────────────────────────
  # Job 2: Deploy Java Parser first (no dependencies)
  # ─────────────────────────────────────────────
  deploy-parser:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Java Parser
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ca-parser
          resourceGroup: uml-architect-rg
          imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/uml-parser:${{ github.sha }}
          registryUrl: ${{ secrets.ACR_NAME }}.azurecr.io
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}

  # ─────────────────────────────────────────────
  # Job 3: Deploy Backend (depends on parser being up)
  # ─────────────────────────────────────────────
  deploy-backend:
    needs: deploy-parser
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Backend
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ca-backend
          resourceGroup: uml-architect-rg
          imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/uml-backend:${{ github.sha }}
          registryUrl: ${{ secrets.ACR_NAME }}.azurecr.io
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
          environmentVariables: >-
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            PARSER_URL=${{ secrets.PARSER_URL }}

  # ─────────────────────────────────────────────
  # Job 4: Deploy Frontend last (depends on backend)
  # ─────────────────────────────────────────────
  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Frontend
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ca-frontend
          resourceGroup: uml-architect-rg
          imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/uml-frontend:${{ github.sha }}
          registryUrl: ${{ secrets.ACR_NAME }}.azurecr.io
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
          environmentVariables: >-
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_API_URL=${{ secrets.BACKEND_URL }}/api/v1
